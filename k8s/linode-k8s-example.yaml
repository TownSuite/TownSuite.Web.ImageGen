# https://www.linode.com/docs/guides/how-to-configure-load-balancing-with-tls-encryption-on-a-kubernetes-cluster/
apiVersion: v1
kind: Namespace
metadata:
  creationTimestamp: null
  name: ts-imagegen-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ts-imagegen-app
  labels:
    app: ts-imagegen-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ts-imagegen-app
  template:
    metadata:
      labels:
        app: ts-imagegen-app
      namespace: ts-imagegen-ns
    spec:
      containers:
      - name: imagegen
        image: townsuite/imagegen:latest
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        # Resource limits cap the blast radius of the proxy's DoS surface (large
        # downloads + image decoding) so one pod cannot exhaust the node. Size the
        # memory limit relative to the app's MaxSourceImagePixels setting (a decoded
        # RGBA image uses roughly pixels * 4 bytes) times expected concurrency;
        # over-limit requests get the pod OOMKilled rather than starving the node.
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "2"
            memory: "1Gi"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        # The root filesystem is read-only; the app needs writable scratch space for
        # its image cache and for temp files.
        - name: cache
          mountPath: /app/cache
        - name: tmp
          mountPath: /tmp
      securityContext:
        runAsNonRoot: true
        # 1654 is the non-root UID/GID baked into the .NET (APP_UID) base image.
        # fsGroup makes the emptyDir volumes writable by that user.
        #
        # OpenShift note: under the default `restricted-v2` SCC, OpenShift ignores
        # runAsUser/runAsGroup and assigns a random UID (in GID 0) plus its own fsGroup.
        # That is fine — the writable volumes below are the actual fix, and OpenShift's
        # fsGroup makes the emptyDir mounts group-writable regardless of the UID. On
        # OpenShift you can simply drop runAsUser/runAsGroup/fsGroup and let the platform
        # assign them; keep them for plain Kubernetes (Linode/LKE) as shown here.
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      volumes:
      # Writable scratch space provided as volumes so the container root filesystem can stay
      # read-only (readOnlyRootFilesystem: true above). The image cache is written here
      # instead of to the image layer, which (a) keeps the rootfs read-only as a hardening
      # control and (b) avoids the "Permission denied" failure when the container runs as a
      # UID that does not own /app/cache (e.g. OpenShift's arbitrary UID).
      # Swap `emptyDir` for a persistentVolumeClaim if the cache should survive restarts.
      - name: cache
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      #imagePullSecrets:
      #- name: [Your Secrets Name]

---
apiVersion: v1
kind: Service
metadata:
  name: ts-imagegen-service
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: ts-imagegen-app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ts-imagegen-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - [Add your url here]
    secretName: letsencrypt-secret-prod
  rules:
  - host: [Add your url here]
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: ts-imagegen-service
            port:
              number: 80

